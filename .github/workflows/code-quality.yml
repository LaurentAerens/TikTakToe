name: Code Quality & SAST

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - ".editorconfig"
      - ".jscpd.json"
      - ".github/tools/duplicate-scan/package.json"
      - ".github/tools/duplicate-scan/package-lock.json"
      - ".github/workflows/code-quality.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - ".editorconfig"
      - ".jscpd.json"
      - ".github/tools/duplicate-scan/package.json"
      - ".github/tools/duplicate-scan/package-lock.json"
      - ".github/workflows/code-quality.yml"

env:
  DOTNET_VERSION: '10.0.x'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      matrix:
        language: [ 'csharp', 'javascript' ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@d02a7766a1131f2a16daab6a31d328a0b2a47444 # v4.30.8
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: .github/codeql-config.yml

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        if: matrix.language == 'csharp'
        run: dotnet restore src/backend/TikTakToe.slnx

      - name: Build for CodeQL
        if: matrix.language == 'csharp'
        run: dotnet build --no-restore src/backend/TikTakToe.slnx -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@d02a7766a1131f2a16daab6a31d328a0b2a47444 # v4.30.8
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep Scan (Docker)
        run: |
          docker run --rm \
            -v "$(pwd):/src" \
            returntocorp/semgrep:1.123.0 \
            semgrep scan /src/src \
              --config=p/csharp \
              --config=p/owasp-top-ten \
              --config=p/security-audit \
              --config=p/secrets \
              --config=p/cwe-top-25 \
              --exclude='**/Generated/**' \
              --exclude='**/*.Tests/**' \
              --exclude='**/TestResults/**' \
              --exclude='**/bin/**' \
              --exclude='**/obj/**' \
              --sarif --output=/src/semgrep-results.sarif

      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@d02a7766a1131f2a16daab6a31d328a0b2a47444 # v4.30.8
        with:
          sarif_file: semgrep-results.sarif
        if: always()

  stylecopanalyzer:
    name: StyleCop Analyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/backend/TikTakToe.slnx

      - name: Build with StyleCop Analysis
        run: |
          dotnet build src/backend/TikTakToe.slnx \
            -c Release \
            -p:EnforceCodeStyleInBuild=true \
            -p:TreatWarningsAsErrors=true \
            --no-restore \
            --verbosity normal 2>&1 | tee build-output.log

      - name: Check for StyleCop Violations
        if: failure()
        run: |
          echo "StyleCop violations detected. Review build output above."
          exit 1

  duplicate-code-scan:
    name: Duplicate Code Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.16.0'

      - name: Install duplicate scan tooling
        run: npm ci --prefix .github/tools/duplicate-scan --ignore-scripts --no-audit --fund false

      - name: Run duplicate scan
        id: scan
        shell: bash
        run: |
          set +e
          ./.github/tools/duplicate-scan/node_modules/.bin/jscpd --config .jscpd.json src/backend src/frontend/src
          SCAN_EXIT_CODE=$?

          echo "scan_exit_code=$SCAN_EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$SCAN_EXIT_CODE" -eq 0 ]; then
            echo "scan_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "scan_status=failure" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Publish duplicate scan summary
        if: always()
        shell: bash
        run: |
          REPORT_FILE=".artifacts/jscpd/jscpd-report.json"
          echo "## Duplicate Code Scan (jscpd)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$REPORT_FILE" ]; then
            DUPLICATION=$(node -p "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('$REPORT_FILE','utf8')); (r.statistics?.total?.percentage ?? 0).toFixed(2)")
            DUP_BLOCKS=$(node -p "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('$REPORT_FILE','utf8')); r.statistics?.total?.clones ?? 0")
            DUP_TOKENS=$(node -p "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('$REPORT_FILE','utf8')); r.statistics?.total?.duplicatedTokens ?? 0")

            echo "- Duplication: ${DUPLICATION}%" >> "$GITHUB_STEP_SUMMARY"
            echo "- Duplicate blocks: ${DUP_BLOCKS}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Duplicated tokens: ${DUP_TOKENS}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No JSON report was produced. Check step logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload duplicate scan report
        if: always() && hashFiles('.artifacts/jscpd/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: duplicate-code-scan-report
          path: .artifacts/jscpd
          retention-days: 14

      - name: Build duplicate scan PR comment body
        if: always() && github.event_name == 'pull_request'
        id: pr_comment_body
        shell: bash
        run: |
          REPORT_FILE=".artifacts/jscpd/jscpd-report.json"
          THRESHOLD="4"
          STATUS_ICON="✅"
          STATUS_TEXT="PASS"

          if [ "${{ steps.scan.outputs.scan_exit_code }}" != "0" ]; then
            STATUS_ICON="❌"
            STATUS_TEXT="FAIL"
          fi

          DUPLICATION="N/A"
          DUP_BLOCKS="N/A"
          DUP_TOKENS="N/A"

          if [ -f "$REPORT_FILE" ]; then
            DUPLICATION=$(node -p "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('$REPORT_FILE','utf8')); (r.statistics?.total?.percentage ?? 0).toFixed(2)")
            DUP_BLOCKS=$(node -p "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('$REPORT_FILE','utf8')); r.statistics?.total?.clones ?? 0")
            DUP_TOKENS=$(node -p "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('$REPORT_FILE','utf8')); r.statistics?.total?.duplicatedTokens ?? 0")
          fi

          {
            echo 'comment_body<<EOF'
            echo '<!-- duplicate-code-scan-report -->'
            echo "## Duplicate Code Scan (jscpd) ${STATUS_ICON} ${STATUS_TEXT}"
            echo
            echo "- Duplication: ${DUPLICATION}%"
            echo "- Duplicate blocks: ${DUP_BLOCKS}"
            echo "- Duplicated tokens: ${DUP_TOKENS}"
            echo "- Threshold: ${THRESHOLD}%"
            echo
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Artifact: duplicate-code-scan-report"
            echo
            echo '_This comment is automatically updated on each run._'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert duplicate scan PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.pr_comment_body.outputs.comment_body }}
        with:
          script: |
            const marker = '<!-- duplicate-code-scan-report -->';
            const body = process.env.COMMENT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce duplicate threshold
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.scan.outputs.scan_exit_code }}" != "0" ]; then
            echo "Duplicate code threshold exceeded. See uploaded artifact for details."
            exit 1
          fi

  code-quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [codeql, semgrep, stylecopanalyzer, duplicate-code-scan]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check Code Quality Status
        run: |
          echo "Code Quality Analysis Complete"
          echo "✓ CodeQL: SAST vulnerability detection"
          echo "✓ Semgrep: Pattern-based code scanning"
          echo "✓ StyleCop: Code style enforcement"
          echo "✓ jscpd: Duplicate code scanning"

          if [[ "${{ needs.codeql.result }}" != "success" ]]; then
            echo "❌ CodeQL failed"
            exit 1
          fi

          if [[ "${{ needs.semgrep.result }}" != "success" ]]; then
            echo "❌ Semgrep failed"
            exit 1
          fi

          if [[ "${{ needs.stylecopanalyzer.result }}" != "success" ]]; then
            echo "❌ StyleCop analyzer failed"
            exit 1
          fi

          if [[ "${{ needs.duplicate-code-scan.result }}" != "success" ]]; then
            echo "❌ Duplicate code scan failed"
            exit 1
          fi
