name: Code Quality & SAST

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - ".editorconfig"
      - ".github/workflows/code-quality.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - ".editorconfig"

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      matrix:
        language: [ 'csharp', 'javascript' ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: .github/codeql-config.yml

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        if: matrix.language == 'csharp'
        run: dotnet restore src/backend/TikTakToe.slnx

      - name: Build for CodeQL
        if: matrix.language == 'csharp'
        run: dotnet build --no-restore src/backend/TikTakToe.slnx -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep Scan (Docker)
        run: |
          docker run --rm \
            -v "$(pwd):/src" \
            returntocorp/semgrep:latest \
            semgrep scan /src/src \
              --config=p/csharp \
              --config=p/owasp-top-ten \
              --config=p/security-audit \
              --config=p/secrets \
              --config=p/cwe-top-25 \
              --exclude='**/Generated/**' \
              --exclude='**/*.Tests/**' \
              --exclude='**/TestResults/**' \
              --exclude='**/bin/**' \
              --exclude='**/obj/**' \
              --sarif --output=/src/semgrep-results.sarif

      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
        if: always()

  stylecopanalyzer:
    name: StyleCop Analyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/backend/TikTakToe.slnx

      - name: Build with StyleCop Analysis
        id: stylecop_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          # Severity is controlled exclusively via .editorconfig.
          # Rules set to 'warning' become errors via TreatWarningsAsErrors=true.
          # Rules set to 'suggestion' or 'none' are advisory only and never block CI.
          dotnet build src/backend/TikTakToe.slnx \
            -c Release \
            -p:EnforceCodeStyleInBuild=true \
            -p:TreatWarningsAsErrors=true \
            --no-restore \
            --verbosity normal 2>&1 | tee build-output.log

      - name: Summarize StyleCop diagnostics
        if: always()
        shell: bash
        run: |
          DIAGNOSTIC_COUNT=$(grep -E -c '\bSA[0-9]{4}\b' build-output.log || true)
          UNIQUE_RULE_COUNT=$( (grep -E -o '\bSA[0-9]{4}\b' build-output.log || true) | sort -u | wc -l | tr -d ' ')

          echo "## StyleCop Analyzer" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.stylecop_build.outcome }}" = "success" ]; then
            echo "- Status: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Status: FAIL" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Diagnostics found: ${DIAGNOSTIC_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unique rules triggered: ${UNIQUE_RULE_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate top StyleCop violations
        if: steps.stylecop_build.outcome == 'failure'
        shell: bash
        run: |
          escape_workflow_data() {
            local value="$1"
            value=${value//'%'/'%25'}
            value=${value//$'\r'/'%0D'}
            value=${value//$'\n'/'%0A'}
            printf '%s' "$value"
          }

          escape_workflow_property() {
            local value
            value=$(escape_workflow_data "$1")
            value=${value//':'/'%3A'}
            value=${value//','/'%2C'}
            printf '%s' "$value"
          }

          set +e
          grep -E '^/.+\.cs\([0-9]+,[0-9]+\): error SA[0-9]{4}:' build-output.log | head -n 50 > stylecop-violations.txt
          while IFS= read -r line; do
            FILE_PATH=$(echo "$line" | sed -E 's#^/home/runner/work/[^/]+/[^/]+/##; s#\(([0-9]+),([0-9]+)\):.*$##')
            LINE_NO=$(echo "$line" | sed -E 's#^.*\(([0-9]+),([0-9]+)\):.*$#\1#')
            COL_NO=$(echo "$line" | sed -E 's#^.*\(([0-9]+),([0-9]+)\):.*$#\2#')
            MESSAGE=$(echo "$line" | sed -E 's#^.*: error (SA[0-9]{4}: .*)$#\1#')
            FILE_PATH_ESCAPED=$(escape_workflow_property "$FILE_PATH")
            MESSAGE_ESCAPED=$(escape_workflow_data "$MESSAGE")
            echo "::error file=${FILE_PATH_ESCAPED},line=${LINE_NO},col=${COL_NO}::${MESSAGE_ESCAPED}"
          done < stylecop-violations.txt

      - name: Enforce StyleCop violations as failure
        if: steps.stylecop_build.outcome == 'failure'
        shell: bash
        run: |
          echo "StyleCop violations detected. Review annotations and build logs."
          exit 1

  code-quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [codeql, semgrep, stylecopanalyzer]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check Code Quality Status
        run: |
          echo "Code Quality Analysis Complete"
          echo "✓ CodeQL: SAST vulnerability detection"
          echo "✓ Semgrep: Pattern-based code scanning"
          echo "✓ StyleCop: Code style enforcement"
