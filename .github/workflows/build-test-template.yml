name: .NET Build and Test Template

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "The name of the project"
      project_path:
        required: true
        type: string
        description: "The relative path to the solution or project file"
      run_tests:
        required: false
        type: boolean
        default: true
        description: "Flag to run or skip tests"
      is_pull_request:
        required: false
        type: boolean
        default: false
        description: "Whether the caller workflow was triggered by a pull_request event"
      pr_number:
        required: false
        type: string
        default: ""
        description: "Pull request number from the caller workflow"

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        env:
          PROJECT_PATH: ${{ inputs.project_path }}
        run: dotnet restore "$PROJECT_PATH"

      - name: Build
        env:
          CI: true
          PROJECT_PATH: ${{ inputs.project_path }}
        run: dotnet build --no-restore --configuration Release -p:CI="$CI" "$PROJECT_PATH"

      - name: Run Tests
        if: ${{ inputs.run_tests }}
        run: |
          dotnet test "${{ inputs.project_path }}" \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage;Format=cobertura" \
            --results-directory=./coverage

      - name: Generate Test Summary
        if: ${{ inputs.run_tests }}
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ inputs.project_name }} Tests | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 See detailed results in the **Test Results** check below" >> $GITHUB_STEP_SUMMARY

      - name: Generate Coverage Report
        if: ${{ inputs.run_tests }}
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.2.0
          find ./coverage -name "coverage.cobertura.xml" -type f || true
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"MarkdownSummaryGithub;Html" \
            -classfilters:"+${{ inputs.project_name }}*"

      - name: Extract Coverage Metrics
        if: ${{ inputs.run_tests }}
        id: coverage
        run: |
          if [ -f "./coverage/report/SummaryGithub.md" ]; then
            COVERAGE=$(grep -A5 "Line coverage" "./coverage/report/SummaryGithub.md" | grep -oP '\d+(?=[^0-9]|$)' | head -1)
            if [ -z "$COVERAGE" ]; then
              COVERAGE="0"
            fi
            echo "COVERAGE_PERCENT=${COVERAGE}" >> $GITHUB_OUTPUT
          else
            echo "COVERAGE_PERCENT=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload Coverage Reports
        if: ${{ inputs.run_tests }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/test-results.trx
          check_name: Test Results
          comment_mode: off

      - name: Extract Test Statistics
        if: ${{ inputs.run_tests }}
        id: test-stats
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path
          
          # Find the TRX file
          trx_files = list(Path('./coverage').rglob('test-results.trx')) if os.path.exists('./coverage') else []
          
          passed = failed = skipped = 0
          
          if trx_files:
            try:
              tree = ET.parse(str(trx_files[0]))
              root = tree.getroot()
              
              # TRX namespace
              ns = {'trx': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
              
              # Count by outcome
              for result in root.findall('.//trx:UnitTestResult', ns):
                outcome = result.get('outcome', '').lower()
                if outcome == 'passed':
                  passed += 1
                elif outcome == 'failed':
                  failed += 1
                elif outcome == 'notexecuted':
                  skipped += 1
            except Exception as e:
              print(f"Warning: Failed to parse TRX: {e}")
          
          total = passed + failed + skipped
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'PASSED={passed}\n')
            f.write(f'FAILED={failed}\n')
            f.write(f'SKIPPED={skipped}\n')
            f.write(f'TOTAL={total}\n')

      - name: Add Test Results Comment
        if: ${{ inputs.run_tests && inputs.is_pull_request && inputs.pr_number != '' }}
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PASSED: ${{ steps.test-stats.outputs.PASSED || '0' }}
          FAILED: ${{ steps.test-stats.outputs.FAILED || '0' }}
          SKIPPED: ${{ steps.test-stats.outputs.SKIPPED || '0' }}
          TOTAL: ${{ steps.test-stats.outputs.TOTAL || '0' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const projectName = process.env.PROJECT_NAME;
            const passed = process.env.PASSED || '0';
            const failed = process.env.FAILED || '0';
            const skipped = process.env.SKIPPED || '0';
            const total = process.env.TOTAL || '0';

            let comment = `## 🧪 Test Results for ${projectName}\n\n`;
            
            if (total > 0) {
              const statusIcon = failed === '0' ? '✅' : '❌';
              comment += `${statusIcon} **${total} tests** executed\n\n`;
              comment += `| Status | Count |\n`;
              comment += `|--------|-------|\n`;
              comment += `| ✅ Passed | ${passed} |\n`;
              comment += `| ❌ Failed | ${failed} |\n`;
              comment += `| ⊘ Skipped | ${skipped} |\n\n`;
            }
            
            comment += `Tests have been published to the **Test Results** check for this workflow run.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 Test Results for')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

      - name: Add Coverage Comment
        if: ${{ inputs.run_tests && inputs.is_pull_request && inputs.pr_number != '' }}
        uses: actions/github-script@v8
        env:
          COVERAGE_PERCENT: ${{ steps.coverage.outputs.COVERAGE_PERCENT }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PROJECT_NAME: ${{ inputs.project_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const coverage = process.env.COVERAGE_PERCENT || '0';
            const githubRepo = process.env.GITHUB_REPO;
            const prNumber = Number(process.env.PR_NUMBER);
            const projectName = process.env.PROJECT_NAME;

            const comment = `## 📈 Code Coverage Report for ${projectName}\n\n| Metric | Value |\n|--------|-------|\n| Line Coverage | ${coverage}% |\n| Report | [View on Codecov](https://codecov.io/gh/${githubRepo}/pull/${prNumber}) |\n\nFor detailed coverage information, see the [Codecov report](https://codecov.io/gh/${githubRepo}).`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📈 Code Coverage Report')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }
